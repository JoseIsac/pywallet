name: Build Windows Portable EXE

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build portable EXE
        shell: pwsh
        run: ./build_windows_exe.ps1 -PythonExe python

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pywallet-windows-portable
          path: dist/pywallet-windows-portable
